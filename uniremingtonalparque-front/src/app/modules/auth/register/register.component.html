<div class="auth-container">
  <div class="auth-card register-card">
    <div class="auth-header">
      <h2>Registro</h2>
      <p>Crea tu cuenta offline</p>
    </div>

    <div *ngIf="errorMessage" class="error-alert">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="success-alert">{{ successMessage }}</div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="nombreCompleto">Nombre Completo</label>
        <input id="nombreCompleto" type="text" formControlName="nombreCompleto" />
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input id="email" type="email" formControlName="email" placeholder="Ej. nombre@correo.com" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" />
        <small>Mínimo 6 caracteres</small>
      </div>

      <button type="submit" class="btn-primary" [disabled]="registerForm.invalid">Registrarse</button>
    </form>

    <div class="auth-footer">
      <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia Sesión</a></p>
    </div>
  </div>
</div>
