<div class="form-container">
  <h2>Registro de Beneficiario</h2>
  <div *ngIf="!isOnline" class="offline-warning">
    Estás sin conexión. Los datos se guardarán localmente.
  </div>

  <div *ngIf="errorMessage" class="error-alert">{{ errorMessage }}</div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-card" style="max-width: 800px; margin: 0 auto;">
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
      <div class="form-group">
        <label for="nombres">Nombres</label>
        <input id="nombres" type="text" formControlName="nombres" />
      </div>

      <div class="form-group">
        <label for="apellidos">Apellidos</label>
        <input id="apellidos" type="text" formControlName="apellidos" />
      </div>

      <div class="form-group">
        <label for="documento">Documento de Identidad</label>
        <input id="documento" type="text" formControlName="documento" />
      </div>

      <div class="form-group">
        <label for="edad">Edad</label>
        <input id="edad" type="number" formControlName="edad" />
      </div>

      <div class="form-group">
        <label for="genero">Género</label>
        <select id="genero" formControlName="genero">
          <option value="">Seleccione...</option>
          <option value="masculino">Masculino</option>
          <option value="femenino">Femenino</option>
          <option value="otro">Otro</option>
        </select>
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input id="telefono" type="text" formControlName="telefono" />
      </div>

      <div class="form-group">
        <label for="municipio">Municipio</label>
        <select id="municipio" formControlName="municipio">
          <option value="">Seleccione...</option>
          <option value="medellin">Medellín</option>
          <option value="bello">Bello</option>
          <option value="itagui">Itagüí</option>
          <option value="rural">Zona Rural (Otro)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="barrio">Barrio / Vereda</label>
        <input id="barrio" type="text" formControlName="barrio" />
      </div>

      <div class="form-group">
        <label for="tipoPoblacion">Tipo de Población</label>
        <select id="tipoPoblacion" formControlName="tipoPoblacion">
          <option value="">Seleccione...</option>
          <option value="emprendedor">Emprendedor</option>
          <option value="empresario">Empresario</option>
          <option value="comunidad">Comunidad General</option>
          <option value="productor">Productor Rural</option>
          <option value="otro">Otro</option>
        </select>
      </div>

      <div class="form-group">
        <label for="servicioSolicitado">Servicio Solicitado Principal</label>
        <input id="servicioSolicitado" type="text" formControlName="servicioSolicitado" />
      </div>
    </div>

    <div class="form-group" style="margin-top: 1rem;">
      <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
        <input type="checkbox" formControlName="autorizacionDatos" style="width: auto;" />
        Autorizo el uso y tratamiento de mis datos personales según las políticas institucionales.
      </label>
    </div>

    <button type="submit" class="btn-primary" [disabled]="form.invalid">Registrar Beneficiario</button>
  </form>
</div>
