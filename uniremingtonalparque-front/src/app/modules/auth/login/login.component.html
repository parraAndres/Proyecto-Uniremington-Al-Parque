<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-placeholder">UR</div>
      <h2>Iniciar Sesión</h2>
      <p>Uniremington al Parque</p>
    </div>

    <div *ngIf="errorMessage" class="error-alert">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo o Documento</label>
        <input id="email" type="text" formControlName="email" placeholder="Ej. nombre@correo.com o 1120957560" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="Ingresa tu contraseña" />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid">Ingresar</button>
    </form>

    <div class="auth-footer">
      <p>¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
    </div>
  </div>
</div>
