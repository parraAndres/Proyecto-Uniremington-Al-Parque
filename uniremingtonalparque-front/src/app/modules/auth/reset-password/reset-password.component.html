<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand-logo" routerLink="/">
        <img src="assets/img/logo.png" alt="Logo Uniremington" />
      </div>
      <h2>Restablecer Contraseña</h2>
      <p>Ingresa tu nueva contraseña para recuperar el acceso.</p>
    </div>

    <div *ngIf="errorMessage" class="alert error-alert">
      <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="alert success-alert">
      <i class="fas fa-check-circle"></i> {{ successMessage }}
      <p>Redirigiendo al login...</p>
    </div>

    <form *ngIf="!successMessage && token" [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group" [class.has-error]="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched">
        <label for="newPassword">Nueva Contraseña</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input id="newPassword" [type]="showPassword ? 'text' : 'password'" formControlName="newPassword" placeholder="Mínimo 6 caracteres" />
          <i class="fas toggle-password" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword" (click)="showPassword = !showPassword"></i>
        </div>
        <small class="error-msg" *ngIf="resetForm.get('newPassword')?.hasError('minlength')">Debe tener al menos 6 caracteres.</small>
      </div>

      <div class="form-group" [class.has-error]="(resetForm.get('confirmPassword')?.touched && resetForm.hasError('mismatch'))">
        <label for="confirmPassword">Confirmar Nueva Contraseña</label>
        <div class="input-wrapper">
          <i class="fas fa-check-double input-icon"></i>
          <input id="confirmPassword" [type]="showConfirmPassword ? 'text' : 'password'" formControlName="confirmPassword" placeholder="Repite la contraseña" />
          <i class="fas toggle-password" [class.fa-eye]="!showConfirmPassword" [class.fa-eye-slash]="showConfirmPassword" (click)="showConfirmPassword = !showConfirmPassword"></i>
        </div>
        <small class="error-msg" *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.hasError('mismatch')">Las contraseñas no coinciden.</small>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading || resetForm.invalid">
        <span *ngIf="!isLoading">Cambiar Contraseña</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>
    </form>

    <div class="auth-footer">
      <a routerLink="/login" class="login-link">Volver al Inicio de Sesión</a>
    </div>
  </div>
</div>
