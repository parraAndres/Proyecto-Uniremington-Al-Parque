<div class="form-container">
  <h2>Diagnóstico Territorial</h2>
  <div *ngIf="!isOnline" class="offline-warning">Modo Offline: Guardado local.</div>
  <div *ngIf="errorMessage" class="error-alert">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="success-alert" style="background-color: #d4edda; color: #155724; padding: 1rem; margin-bottom: 1rem; border-radius: 4px;">{{ successMessage }}</div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-card" style="max-width: 600px; margin: 0 auto;">
    
    <div class="form-group">
      <label for="problematica">Descripción de la Problemática</label>
      <textarea id="problematica" formControlName="problematica" rows="3" style="width: 100%; border: 1px solid #ccc; border-radius: 4px; padding: 0.75rem; font-family: inherit;"></textarea>
    </div>

    <div class="form-group">
      <label for="clasificacion">Clasificación</label>
      <select id="clasificacion" formControlName="clasificacion">
        <option value="">Seleccione...</option>
        <option value="salud">Salud Pública</option>
        <option value="legal">Legal / Jurídico</option>
        <option value="productivo">Desarrollo Productivo</option>
        <option value="ambiental">Medio Ambiente</option>
        <option value="infraestructura">Infraestructura</option>
      </select>
    </div>

    <div class="form-group">
      <label for="prioridad">Prioridad de Atención</label>
      <select id="prioridad" formControlName="prioridad">
        <option value="">Seleccione...</option>
        <option value="alta">Alta (Urgente)</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
    </div>

    <button type="submit" class="btn-primary" [disabled]="form.invalid">Guardar Diagnóstico</button>
  </form>
</div>
