# ============================================================
#   Uniremington al Parque + VetSync Pro - application.properties
#   Ambiente: Desarrollo Local
# ============================================================

# --- Servidor ---
server.port=8080
server.servlet.context-path=/api

# --- Base de Datos MySQL 8 ---
spring.datasource.url=jdbc:mysql://localhost:3306/uniremingtonalparque_db
spring.datasource.username=root
spring.datasource.password=emmanuel
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# update: crea/altera tablas automáticamente (development only)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.flyway.enabled=false

# --- JWT - VetSync Pro ---
vetsync.jwt.secret=c2VjcmV0S2V5VmV0U3luY1BybzIwMjVTdXBlclNlY3VyZUJhc2U2NAo=
vetsync.jwt.expiration-ms=86400000

# --- JWT - Uniremington al Parque ---
# Secret en Base64 (mínimo 256 bits para HMAC-SHA256)
# Puedes regenerarlo con: echo -n "UniremingtonAlParque2025SecretKey32chars" | base64
uniremington.jwt.secret=VW5pcmVtaW5ndG9uQWxQYXJxdWUyMDI1U2VjcmV0S2V5MzJjaGFycwo=
uniremington.jwt.expiration-ms=86400000

# --- Spring Batch ---
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# --- SpringDoc / Swagger ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.use-management-port=false

# --- Logging ---
logging.level.com.vetsync=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# --- Email Configuration (SMTP) ---
# Si usas Gmail:
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=tu-correo@gmail.com
# spring.mail.password=tu-contraseña-de-aplicacion
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Ejemplo con Mailtrap (Recomendado para pruebas):
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=YOUR_MAILTRAP_USERNAME
spring.mail.password=YOUR_MAILTRAP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- App URLs ---
app.frontend.url=http://localhost:4200

