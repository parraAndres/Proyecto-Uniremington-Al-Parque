<div class="supervision-container">
  <div class="sup-header">
    <div class="header-icon-wrap gradient-green">
      <i class="fas fa-map-marked-alt"></i>
    </div>
    <div>
      <h1>Diagnóstico Territorial</h1>
      <p>Registra, clasifica y prioriza las problemáticas identificadas en la comunidad.</p>
    </div>
  </div>

  <div *ngIf="!isOnline" class="offline-banner">
    <i class="fas fa-wifi-slash"></i> Modo Offline: El diagnóstico se guardará localmente.
  </div>
  <div *ngIf="errorMessage" class="alert-error">
    <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
  </div>
  <div *ngIf="successMessage" class="alert-success">
    <i class="fas fa-check-circle"></i> {{ successMessage }}
  </div>

  <div class="data-card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="modern-form">
      <div class="form-row">
        <div class="field-group full-width">
          <label><i class="fas fa-align-left"></i> Descripción de la Problemática *</label>
          <textarea id="problematica" formControlName="problematica" rows="4" placeholder="Describe el contexto y el problema..."></textarea>
        </div>
      </div>

      <div class="form-row">
        <div class="field-group">
          <label><i class="fas fa-tags"></i> Clasificación *</label>
          <select id="clasificacion" formControlName="clasificacion" class="custom-select">
            <option value="">Seleccione...</option>
            <option value="salud">Salud Pública</option>
            <option value="legal">Legal / Jurídico</option>
            <option value="productivo">Desarrollo Productivo</option>
            <option value="ambiental">Medio Ambiente</option>
            <option value="infraestructura">Infraestructura</option>
          </select>
        </div>
        <div class="field-group">
          <label><i class="fas fa-exclamation-triangle"></i> Prioridad de Atención *</label>
          <select id="prioridad" formControlName="prioridad" class="custom-select">
            <option value="">Seleccione...</option>
            <option value="alta">Alta (Urgente)</option>
            <option value="media">Media</option>
            <option value="baja">Baja</option>
          </select>
        </div>
      </div>

      <div style="margin-top: 1.5rem; text-align: right;">
        <button type="submit" class="btn-primary-action" [disabled]="form.invalid">
          <i class="fas fa-save"></i> Guardar Diagnóstico
        </button>
      </div>
    </form>
  </div>
</div>
