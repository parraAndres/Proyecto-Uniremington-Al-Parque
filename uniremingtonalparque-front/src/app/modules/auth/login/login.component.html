<div class="auth-page">
  <a routerLink="/" class="btn-back-home">
    <i class="fas fa-arrow-left"></i> Volver al Inicio
  </a>
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand-logo" routerLink="/">
        <img src="assets/img/logo.png" alt="Logo Uniremington" />
      </div>
      <h2>Bienvenido de Vuelta</h2>
      <p>Inicia sesión en Uniremington Al Parque.</p>
    </div>

    <div *ngIf="errorMessage" class="alert error-alert">
      <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group" [class.has-error]="loginForm.get('documento')?.invalid && loginForm.get('documento')?.touched">
        <label for="documento">Correo o Documento de Identidad</label>
        <div class="input-wrapper">
          <i class="fas fa-user input-icon"></i>
          <input id="documento" type="text" formControlName="documento" placeholder="Ingresa tu correo o documento" />
        </div>
        <small class="error-msg" *ngIf="loginForm.get('documento')?.hasError('required') && loginForm.get('documento')?.touched">El correo o documento es obligatorio.</small>
      </div>

      <div class="form-group" [class.has-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input id="password" type="password" formControlName="password" placeholder="Ingresa tu contraseña" />
        </div>
        <small class="error-msg" *ngIf="loginForm.get('password')?.hasError('required') && loginForm.get('password')?.touched">La contraseña es obligatoria.</small>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>
    </form>

    <div class="auth-footer">
      <p>¿No tienes una cuenta? <a routerLink="/register" class="login-link">Regístrate aquí</a></p>
    </div>
  </div>
</div>
