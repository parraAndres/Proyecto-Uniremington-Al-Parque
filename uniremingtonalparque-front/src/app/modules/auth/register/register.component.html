<div class="auth-page">
  <a routerLink="/" class="btn-back-home">
    <i class="fas fa-arrow-left"></i> Volver al Inicio
  </a>
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand-logo" routerLink="/">
        <img src="assets/img/logo.png" alt="Logo Uniremington" />
      </div>
      <h2>Únete a Nosotros</h2>
      <p>Crea tu cuenta para participar en Uniremington Al Parque.</p>
    </div>

    <div *ngIf="errorMessage" class="alert error-alert">
      <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="alert success-alert">
      <i class="fas fa-check-circle"></i> {{ successMessage }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group" [class.has-error]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
        <label for="email">Correo Electrónico</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input id="email" type="email" formControlName="email" placeholder="Ej. juan@ejemplo.com" />
        </div>
        <small class="error-msg" *ngIf="registerForm.get('email')?.hasError('required') && registerForm.get('email')?.touched">El correo es obligatorio.</small>
        <small class="error-msg" *ngIf="registerForm.get('email')?.hasError('email') && registerForm.get('email')?.touched">Ingresa un correo válido.</small>
      </div>

      <div class="form-group" [class.has-error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input id="password" type="password" formControlName="password" placeholder="Crea una contraseña segura" />
        </div>
        <small class="error-msg" *ngIf="registerForm.get('password')?.hasError('required') && registerForm.get('password')?.touched">La contraseña es obligatoria.</small>
        <small class="error-msg" *ngIf="registerForm.get('password')?.hasError('minlength') && registerForm.get('password')?.touched">Mínimo 6 caracteres.</small>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Registrarse</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>
    </form>

    <div class="auth-footer">
      <p>¿Ya tienes una cuenta? <a routerLink="/login" class="login-link">Inicia sesión aquí</a></p>
    </div>
  </div>
</div>
